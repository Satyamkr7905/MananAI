# DSA By NOVA — full stack: PostgreSQL + FastAPI backend + Next.js frontend.
#
# usage (from this directory):
#   docker compose up --build
#
# API at http://localhost:8000. backend reads secrets from
# adaptive_dsa_agent/.env — create it from .env.example if needed.
# DATABASE_URL in that file is overridden here so the API uses the `db` service.
# for the Next.js build, set GOOGLE_CLIENT_ID in a `.env` file next to this
# file (or export) so NEXT_PUBLIC_GOOGLE_CLIENT_ID gets baked in.

name: dsa-by-nova

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: nova
      POSTGRES_DB: dsa_by_nova
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nova -d dsa_by_nova"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./adaptive_dsa_agent
      dockerfile: Dockerfile
    env_file:
      - ./adaptive_dsa_agent/.env
    environment:
      # override host .env so container talks to the compose network DB
      DATABASE_URL: postgresql+psycopg://nova:nova@db:5432/dsa_by_nova
      CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000,http://web:3000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./adaptive_dsa_frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: "http://localhost:8000"
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
